<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <meta
            name="theme-color"
            content="#151a26"
        />
        <meta
            name="mobile-web-app-capable"
            content="yes"
        />
        <meta
            name="apple-mobile-web-app-capable"
            content="yes"
        />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta
            name="apple-mobile-web-app-title"
            content="Tasbih Counter"
        />
        <title>Tasbih Counter - HTML Version</title>
        <link
            rel="manifest"
            href="./manifest.webmanifest"
        />
        <link
            rel="icon"
            href="./icon.svg"
            type="image/svg+xml"
        />
        <link
            rel="apple-touch-icon"
            href="./icon.svg"
        />
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --background: hsl(220 20% 8%);
                --foreground: hsl(45 30% 90%);
                --card: hsl(220 15% 12%);
                --card-soft: hsl(220 15% 18% / 0.65);
                --primary: hsl(45 80% 55%);
                --muted-foreground: hsl(220 10% 62%);
                --accent: hsl(45 60% 45%);
                --border: hsl(220 12% 22%);
                --danger: hsl(0 72% 62%);

                --prayer-fajr: linear-gradient(
                    180deg,
                    hsl(220 40% 12%) 0%,
                    hsl(210 50% 25%) 50%,
                    hsl(35 40% 30%) 100%
                );
                --prayer-dhuhr: linear-gradient(
                    180deg,
                    hsl(45 50% 20%) 0%,
                    hsl(40 40% 15%) 50%,
                    hsl(35 30% 10%) 100%
                );
                --prayer-asr: linear-gradient(
                    180deg,
                    hsl(35 50% 18%) 0%,
                    hsl(30 45% 14%) 50%,
                    hsl(25 35% 10%) 100%
                );
                --prayer-maghrib: linear-gradient(
                    180deg,
                    hsl(15 50% 18%) 0%,
                    hsl(340 30% 15%) 50%,
                    hsl(260 25% 12%) 100%
                );
                --prayer-isha: linear-gradient(
                    180deg,
                    hsl(240 30% 8%) 0%,
                    hsl(230 25% 10%) 50%,
                    hsl(220 20% 8%) 100%
                );
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                min-height: 100%;
            }

            body {
                font-family: "IBM Plex Sans Arabic", sans-serif;
                color: var(--foreground);
                background: var(--background);
            }

            .hidden {
                display: none !important;
            }

            .app {
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                padding: 1.5rem 0.5rem;
                position: relative;
                overflow: hidden;
                transition: background 550ms ease;
            }

            .prayer-bg-fajr {
                background: var(--prayer-fajr);
            }
            .prayer-bg-dhuhr {
                background: var(--prayer-dhuhr);
            }
            .prayer-bg-asr {
                background: var(--prayer-asr);
            }
            .prayer-bg-maghrib {
                background: var(--prayer-maghrib);
            }
            .prayer-bg-isha {
                background: var(--prayer-isha);
            }

            .panel-enter {
                animation: panelIn 220ms ease;
            }

            @keyframes panelIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .header {
                width: 100%;
                text-align: center;
                padding-top: 0.4rem;
            }

            .bismillah {
                margin: 0;
                color: var(--primary);
                font-family: "Amiri", serif;
                font-size: 1.65rem;
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            .subtitle {
                margin: 0.2rem 0 0;
                font-size: 0.64rem;
                letter-spacing: 0.2em;
                color: var(--muted-foreground);
            }

            .dua-selector-wrap {
                width: 100%;
                margin-top: 1rem;
                padding: 0 1rem;
                max-width: 460px;
            }

            .dua-row {
                display: flex;
                align-items: stretch;
                gap: 0.5rem;
            }

            .dropdown {
                flex: 1;
                min-width: 0;
                position: relative;
            }

            .dropdown-btn {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 0.85rem;
                background: var(--card-soft);
                color: var(--foreground);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.8rem;
                padding: 0.8rem 1rem;
                cursor: pointer;
            }

            .dropdown-content {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                min-width: 0;
            }

            .dua-arabic {
                font-family: "Amiri", serif;
                color: var(--primary);
                font-size: 1rem;
                line-height: 1.1;
                width: 100%;
                text-align: left;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .dua-meta {
                margin-top: 0.22rem;
                font-size: 0.7rem;
                color: var(--muted-foreground);
                width: 100%;
                text-align: left;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .dropdown-icons {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .selected-status {
                font-size: 1rem;
                font-weight: 700;
                line-height: 1;
            }

            .selected-status.done {
                color: hsl(145 70% 48%);
            }
            .selected-status.todo {
                color: hsl(355 78% 62%);
            }

            .chevron {
                font-size: 0.9rem;
                color: var(--muted-foreground);
                transition: transform 150ms ease;
            }

            .chevron.open {
                transform: rotate(180deg);
            }

            .streak-badge {
                width: 96px;
                border: 1px solid hsl(45 80% 55% / 0.35);
                background: hsl(45 80% 55% / 0.15);
                border-radius: 0.85rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.35rem;
                padding: 0.6rem 0.45rem;
            }

            .streak-icon {
                font-size: 1.2rem;
            }

            .streak-value {
                color: var(--primary);
                font-size: 1.1rem;
                font-weight: 700;
                line-height: 1;
            }

            .dropdown-menu {
                position: absolute;
                left: 0;
                right: 0;
                top: calc(100% + 0.35rem);
                max-height: 260px;
                overflow: auto;
                border: 1px solid var(--border);
                border-radius: 0.85rem;
                background: hsl(220 15% 13% / 0.95);
                backdrop-filter: blur(5px);
                z-index: 50;
                box-shadow: 0 16px 36px hsl(220 60% 3% / 0.4);
            }

            .dua-item {
                width: 100%;
                border: 0;
                border-bottom: 1px solid hsl(220 12% 22% / 0.75);
                background: transparent;
                color: var(--foreground);
                text-align: left;
                padding: 0.7rem 1rem;
                cursor: pointer;
            }

            .dua-item:last-child {
                border-bottom: 0;
            }
            .dua-item:hover {
                background: hsl(220 16% 22% / 0.5);
            }
            .dua-item.active {
                background: hsl(45 80% 55% / 0.12);
            }

            .dua-item-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.5rem;
            }

            .dua-item .arabic {
                font-family: "Amiri", serif;
                color: var(--primary);
                font-size: 1rem;
            }

            .dua-status {
                font-size: 0.95rem;
                font-weight: 700;
                line-height: 1;
            }

            .dua-status.done {
                color: hsl(145 70% 48%);
            }
            .dua-status.todo {
                color: hsl(355 78% 62%);
            }

            .dua-item .detail {
                margin-top: 0.15rem;
                font-size: 0.74rem;
                color: var(--muted-foreground);
            }

            .dua-item .target {
                margin-top: 0.12rem;
                font-size: 0.67rem;
                color: var(--accent);
            }

            .counter-zone {
                flex: 1;
                width: 100%;
                display: grid;
                place-items: center;
                margin-top: 0.3rem;
            }

            .counter-wrap {
                width: min(88vw, 360px);
                aspect-ratio: 1 / 1;
                position: relative;
                user-select: none;
            }

            .counter-ring {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
            }

            .center-circle {
                width: min(38vw, 140px);
                height: min(38vw, 140px);
                max-width: 140px;
                max-height: 140px;
                border-radius: 999px;
                border: 2px solid var(--border);
                background: var(--card);
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 5;
            }

            .center-circle.done {
                animation: pulseDone 520ms ease;
            }

            @keyframes pulseDone {
                0% {
                    transform: translate(-50%, -50%) scale(1);
                }
                50% {
                    transform: translate(-50%, -50%) scale(1.08);
                }
                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
            }

            .count-value {
                font-family: "Amiri", serif;
                color: var(--primary);
                font-size: clamp(2.6rem, 11vw, 3.6rem);
                font-weight: 700;
                line-height: 1;
            }

            .completion-glow {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                pointer-events: none;
                opacity: 1;
                transition: opacity 280ms ease;
            }

            .dua-meaning {
                margin: 0 0 0.9rem;
                padding: 0 2rem;
                color: var(--muted-foreground);
                text-align: center;
                font-size: 0.73rem;
                font-style: italic;
                user-select: none;
            }

            .prayer-selector {
                width: 100%;
                max-width: 400px;
                padding: 0 1rem 0.6rem;
                display: grid;
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 0.45rem;
            }

            .prayer-btn {
                border-radius: 0.8rem;
                border: 1px solid transparent;
                background: hsl(220 15% 18% / 0.55);
                color: var(--muted-foreground);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.1rem;
                min-height: 56px;
                cursor: pointer;
                transition:
                    transform 100ms ease,
                    background 160ms ease,
                    border-color 160ms ease;
            }

            .prayer-btn:active {
                transform: scale(0.95);
            }

            .prayer-btn.active {
                background: hsl(45 80% 55% / 0.14);
                border-color: hsl(45 80% 55% / 0.34);
                color: var(--primary);
            }

            .prayer-btn.disabled {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .prayer-btn.locked {
                box-shadow: inset 0 0 0 1px hsl(0 70% 62% / 0.4);
            }

            .prayer-icon {
                font-size: 1rem;
                line-height: 1;
            }

            .prayer-label {
                margin-top: 0.1rem;
                font-size: 0.62rem;
                font-weight: 500;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 100%;
            }

            .settings-shell {
                position: fixed;
                right: 1rem;
                bottom: 1.4rem;
                z-index: 70;
            }

            .settings-btn {
                width: 40px;
                height: 40px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: hsl(220 15% 18% / 0.82);
                color: var(--muted-foreground);
                cursor: pointer;
            }

            .settings-panel {
                position: absolute;
                right: 0;
                bottom: 50px;
                width: 245px;
                border: 1px solid var(--border);
                border-radius: 0.8rem;
                background: hsl(220 15% 14% / 0.96);
                box-shadow: 0 14px 34px hsl(220 60% 2% / 0.45);
                padding: 0.9rem;
                max-height: min(76vh, 620px);
                overflow: auto;
            }

            .settings-title {
                margin: 0 0 0.8rem;
                font-size: 0.68rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--primary);
                font-weight: 600;
            }

            .checkbox-row {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-size: 0.76rem;
            }

            .intensity-wrap {
                margin-top: 0.8rem;
                padding-left: 1.5rem;
            }

            .intensity-label {
                display: block;
                margin-bottom: 0.28rem;
                font-size: 0.65rem;
                color: var(--muted-foreground);
            }

            .intensity-wrap input[type="range"],
            #customTargetRange {
                width: 100%;
            }

            .settings-group {
                margin-top: 0.85rem;
            }

            .settings-label {
                margin: 0 0 0.35rem;
                font-size: 0.65rem;
                color: var(--muted-foreground);
            }

            .settings-action {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 0.6rem;
                background: hsl(220 15% 19% / 0.8);
                color: var(--foreground);
                cursor: pointer;
                font-size: 0.75rem;
                font-weight: 500;
                padding: 0.48rem 0.55rem;
            }

            .settings-action.danger {
                border-color: hsl(0 72% 62% / 0.45);
                color: var(--danger);
                background: hsl(0 72% 62% / 0.12);
            }

            @media (max-width: 440px) {
                .app {
                    padding-top: 1rem;
                }

                .dua-meaning {
                    padding: 0 1.3rem;
                }

                .settings-shell {
                    right: 0.65rem;
                    bottom: 1rem;
                }

                .streak-badge {
                    width: 88px;
                }
            }
        </style>
    </head>
    <body>
        <main
            id="app"
            class="app prayer-bg-fajr"
        >
            <section
                id="header"
                class="header panel-enter"
            >
                <h1 class="bismillah">بِسْمِ اللَّهِ</h1>
                <p class="subtitle">TASBIH COUNTER</p>
            </section>

            <section
                id="duaSelectorWrap"
                class="dua-selector-wrap panel-enter"
            >
                <div class="dua-row">
                    <div
                        class="dropdown"
                        id="duaDropdown"
                    >
                        <button
                            id="duaButton"
                            class="dropdown-btn"
                            type="button"
                            aria-haspopup="listbox"
                            aria-expanded="false"
                        >
                            <span class="dropdown-content">
                                <span
                                    id="duaArabic"
                                    class="dua-arabic"
                                ></span>
                                <span
                                    id="duaMeta"
                                    class="dua-meta"
                                ></span>
                            </span>
                            <span class="dropdown-icons">
                                <span
                                    id="selectedDuaStatus"
                                    class="selected-status"
                                    >✗</span
                                >
                                <span
                                    id="duaChevron"
                                    class="chevron"
                                    >▾</span
                                >
                            </span>
                        </button>
                        <div
                            id="duaMenu"
                            class="dropdown-menu hidden"
                            role="listbox"
                            aria-label="Dua options"
                        ></div>
                    </div>
                    <div
                        id="streakBadge"
                        class="streak-badge"
                        aria-label="Streak"
                    >
                        <span class="streak-icon">🔥</span>
                        <span
                            id="streakValue"
                            class="streak-value"
                            >0</span
                        >
                    </div>
                </div>
            </section>

            <section class="counter-zone">
                <div
                    id="counterWrap"
                    class="counter-wrap"
                >
                    <svg
                        id="classicRing"
                        class="counter-ring"
                        viewBox="0 0 320 320"
                        width="320"
                        height="320"
                        aria-hidden="true"
                    ></svg>
                    <svg
                        id="modernRing"
                        class="counter-ring hidden"
                        viewBox="0 0 320 320"
                        width="320"
                        height="320"
                        aria-hidden="true"
                    ></svg>

                    <div
                        id="centerCircle"
                        class="center-circle"
                        role="button"
                        tabindex="0"
                        aria-label="Tasbih counter center button"
                    >
                        <div
                            id="countValue"
                            class="count-value"
                        >
                            0
                        </div>
                    </div>

                    <div
                        id="completionGlow"
                        class="completion-glow hidden"
                    ></div>
                </div>
            </section>

            <p
                id="duaMeaning"
                class="dua-meaning panel-enter"
            ></p>

            <section
                id="prayerSelector"
                class="prayer-selector panel-enter"
                aria-label="Prayer selector"
            ></section>

            <section
                class="settings-shell"
                id="settingsShell"
            >
                <button
                    id="settingsToggle"
                    class="settings-btn"
                    type="button"
                    aria-expanded="false"
                    aria-controls="settingsPanel"
                    aria-label="Open settings"
                >
                    ⚙
                </button>
                <div
                    id="settingsPanel"
                    class="settings-panel hidden"
                    role="dialog"
                    aria-label="Settings"
                >
                    <p class="settings-title">Settings</p>
                    <label
                        class="checkbox-row"
                        for="vibrationCheck"
                    >
                        <input
                            id="vibrationCheck"
                            type="checkbox"
                        />
                        <span>Vibration</span>
                    </label>
                    <div
                        id="intensityWrap"
                        class="intensity-wrap"
                    >
                        <label
                            for="intensityRange"
                            class="intensity-label"
                            >Intensity:
                            <span id="intensityValue">40</span>ms</label
                        >
                        <input
                            id="intensityRange"
                            type="range"
                            min="0"
                            max="100"
                            step="5"
                            value="40"
                        />
                    </div>

                    <div class="settings-group">
                        <p class="settings-label">App mode</p>
                        <button
                            id="modeToggle"
                            class="settings-action"
                            type="button"
                        >
                            Custom Mode
                        </button>
                    </div>

                    <div
                        id="customTargetWrap"
                        class="settings-group hidden"
                    >
                        <label
                            for="customTargetRange"
                            class="settings-label"
                            >Custom target:
                            <span id="customTargetValue">100</span></label
                        >
                        <input
                            id="customTargetRange"
                            type="range"
                            min="1"
                            max="1000"
                            step="1"
                            value="100"
                        />
                    </div>

                    <div class="settings-group">
                        <p class="settings-label">Counter style</p>
                        <button
                            id="styleToggle"
                            class="settings-action"
                            type="button"
                        >
                            Modern
                        </button>
                    </div>

                    <div class="settings-group">
                        <p class="settings-label">Screen</p>
                        <button
                            id="fullscreenToggle"
                            class="settings-action"
                            type="button"
                        >
                            Full Screen
                        </button>
                    </div>

                    <div class="settings-group">
                        <button
                            id="resetAllButton"
                            class="settings-action danger"
                            type="button"
                        >
                            Reset all data
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <script>
            (() => {
                const prayers = [
                    { id: "fajr", label: "Fajr", arabic: "الفجر", icon: "🌅" },
                    {
                        id: "dhuhr",
                        label: "Dhuhr",
                        arabic: "الظهر",
                        icon: "☀️",
                    },
                    { id: "asr", label: "Asr", arabic: "العصر", icon: "🌤️" },
                    {
                        id: "maghrib",
                        label: "Maghrib",
                        arabic: "المغرب",
                        icon: "🌇",
                    },
                    { id: "isha", label: "Isha", arabic: "العشاء", icon: "🌙" },
                ];

                const duas = [
                    {
                        id: "subhanallah",
                        arabic: "سُبْحَانَ اللَّهِ",
                        transliteration: "SubhanAllah",
                        meaning: "Glory be to Allah",
                        target: 33,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "alhamdulillah",
                        arabic: "الْحَمْدُ لِلَّهِ",
                        transliteration: "Alhamdulillah",
                        meaning: "All praise is due to Allah",
                        target: 33,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "allahuakbar",
                        arabic: "اللَّهُ أَكْبَرُ",
                        transliteration: "Allahu Akbar",
                        meaning: "Allah is the Greatest",
                        target: 34,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "lailahaillallah",
                        arabic: "لَا إِلَهَ إِلَّا اللَّهُ",
                        transliteration: "La ilaha illallah",
                        meaning: "There is no god but Allah",
                        target: 100,
                        prayer: ["fajr", "maghrib", "isha"],
                    },
                    {
                        id: "astaghfirullah",
                        arabic: "أَسْتَغْفِرُ اللَّهَ",
                        transliteration: "Astaghfirullah",
                        meaning: "I seek forgiveness from Allah",
                        target: 33,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "lahawla",
                        arabic: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",
                        transliteration: "La hawla wa la quwwata illa billah",
                        meaning:
                            "There is no power nor strength except with Allah",
                        target: 33,
                        prayer: ["fajr", "isha"],
                    },
                    {
                        id: "ayatulkursi",
                        arabic: "آية الكرسي",
                        transliteration: "Ayatul Kursi",
                        meaning: "The Throne Verse (recite once)",
                        target: 1,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "sayyidulistighfar",
                        arabic: "سيد الاستغفار",
                        transliteration: "Sayyidul Istighfar",
                        meaning: "Master supplication for forgiveness",
                        target: 3,
                        prayer: ["fajr", "maghrib"],
                    },
                    {
                        id: "durood",
                        arabic: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ",
                        transliteration: "Allahumma salli ala Muhammad",
                        meaning: "Send blessings upon Muhammad ﷺ",
                        target: 10,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                    {
                        id: "subhanallahi_wabihamdihi",
                        arabic: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
                        transliteration: "SubhanAllahi wa bihamdihi",
                        meaning: "Glory and praise be to Allah",
                        target: 100,
                        prayer: ["fajr", "isha"],
                    },
                    {
                        id: "allahumma_inni_asalukal_afiyah",
                        arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ",
                        transliteration: "Allah Humma Inni As'alukal Afiyah",
                        meaning: "O Allah, I ask You for well-being",
                        target: 10,
                        prayer: ["fajr", "dhuhr", "asr", "maghrib", "isha"],
                    },
                ];

                const APP_STORAGE_KEY = "tasbih-progress-v2";
                const SETTINGS_STORAGE_KEY = "tasbih-settings";
                const PRAYER_ORDER = [
                    "fajr",
                    "dhuhr",
                    "asr",
                    "maghrib",
                    "isha",
                ];
                const ISHA_START_MINUTES = 1200;
                const MIN_COMPLETED_DUAS_PER_PRAYER_FOR_STREAK = 3;

                const prayerBgClass = {
                    fajr: "prayer-bg-fajr",
                    dhuhr: "prayer-bg-dhuhr",
                    asr: "prayer-bg-asr",
                    maghrib: "prayer-bg-maghrib",
                    isha: "prayer-bg-isha",
                };

                const glowHues = {
                    fajr: "210, 60%, 50%",
                    dhuhr: "45, 70%, 55%",
                    asr: "35, 65%, 50%",
                    maghrib: "15, 70%, 50%",
                    isha: "240, 50%, 50%",
                };

                const svgNS = "http://www.w3.org/2000/svg";

                const app = document.getElementById("app");
                const duaButton = document.getElementById("duaButton");
                const duaArabic = document.getElementById("duaArabic");
                const duaMeta = document.getElementById("duaMeta");
                const duaChevron = document.getElementById("duaChevron");
                const selectedDuaStatus =
                    document.getElementById("selectedDuaStatus");
                const duaMenu = document.getElementById("duaMenu");
                const streakValue = document.getElementById("streakValue");
                const classicRing = document.getElementById("classicRing");
                const modernRing = document.getElementById("modernRing");
                const centerCircle = document.getElementById("centerCircle");
                const countValue = document.getElementById("countValue");
                const completionGlow =
                    document.getElementById("completionGlow");
                const duaMeaning = document.getElementById("duaMeaning");
                const prayerSelector =
                    document.getElementById("prayerSelector");

                const settingsShell = document.getElementById("settingsShell");
                const settingsToggle =
                    document.getElementById("settingsToggle");
                const settingsPanel = document.getElementById("settingsPanel");
                const vibrationCheck =
                    document.getElementById("vibrationCheck");
                const intensityWrap = document.getElementById("intensityWrap");
                const intensityRange =
                    document.getElementById("intensityRange");
                const intensityValue =
                    document.getElementById("intensityValue");
                const modeToggle = document.getElementById("modeToggle");
                const customTargetWrap =
                    document.getElementById("customTargetWrap");
                const customTargetRange =
                    document.getElementById("customTargetRange");
                const customTargetValue =
                    document.getElementById("customTargetValue");
                const styleToggle = document.getElementById("styleToggle");
                const fullscreenToggle =
                    document.getElementById("fullscreenToggle");
                const resetAllButton =
                    document.getElementById("resetAllButton");

                const toDateKey = (date) => {
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, "0");
                    const d = String(date.getDate()).padStart(2, "0");
                    return `${y}-${m}-${d}`;
                };

                const dayDiff = (fromKey, toKey) => {
                    const from = new Date(`${fromKey}T00:00:00`);
                    const to = new Date(`${toKey}T00:00:00`);
                    return Math.floor(
                        (to.getTime() - from.getTime()) / 86400000,
                    );
                };

                const isConsecutiveDay = (previousKey, nextKey) =>
                    dayDiff(previousKey, nextKey) === 1;

                const minutesNow = (date) =>
                    date.getHours() * 60 + date.getMinutes();

                const getPrayerForTime = (date) => {
                    const mins = minutesNow(date);
                    if (mins >= 300 && mins < 420) return "fajr";
                    if (mins >= 720 && mins < 900) return "dhuhr";
                    if (mins >= 990 && mins < 1050) return "asr";
                    if (mins >= 1080 && mins < 1140) return "maghrib";
                    if (mins >= 1200 && mins < 1320) return "isha";
                    return null;
                };

                const getLockedPrayersByTime = (date) => {
                    const mins = minutesNow(date);
                    return {
                        fajr: mins >= 420,
                        dhuhr: mins >= 900,
                        asr: mins >= 1050,
                        maghrib: mins >= 1140,
                        isha: mins >= 1320,
                    };
                };

                const firstDuaForPrayer = (prayer) =>
                    duas.find((d) => d.prayer.includes(prayer)) || null;

                const createEmptyPrayerProgress = (prayer) => ({
                    selectedDuaId: (firstDuaForPrayer(prayer) || {}).id || null,
                    duaCounts: {},
                    completedDuaIds: [],
                    hasCompletedAny: false,
                });

                const createEmptyDailyState = (date, selectedPrayer) => {
                    const activePrayer = getPrayerForTime(date);
                    const initialPrayer =
                        selectedPrayer || activePrayer || "fajr";
                    return {
                        dateKey: toDateKey(date),
                        selectedPrayer: initialPrayer,
                        prayers: {
                            fajr: createEmptyPrayerProgress("fajr"),
                            dhuhr: createEmptyPrayerProgress("dhuhr"),
                            asr: createEmptyPrayerProgress("asr"),
                            maghrib: createEmptyPrayerProgress("maghrib"),
                            isha: createEmptyPrayerProgress("isha"),
                        },
                        customMode: { count: 0, target: 100 },
                        streak: 0,
                        lastStreakDate: null,
                    };
                };

                const migratePrayerProgress = (prayer, progress) => {
                    const allowedDuas = duas.filter((d) =>
                        d.prayer.includes(prayer),
                    );
                    const allowedIds = new Set(allowedDuas.map((d) => d.id));
                    const targetById = new Map(
                        allowedDuas.map((d) => [d.id, d.target]),
                    );

                    const selectedDuaId =
                        progress &&
                        progress.selectedDuaId &&
                        allowedIds.has(progress.selectedDuaId)
                            ? progress.selectedDuaId
                            : (firstDuaForPrayer(prayer) || {}).id || null;

                    const rawCounts = (progress && progress.duaCounts) || {};
                    const duaCounts = {};
                    allowedDuas.forEach((dua) => {
                        const raw = Number(rawCounts[dua.id]);
                        duaCounts[dua.id] =
                            Number.isFinite(raw) && raw > 0
                                ? Math.floor(raw)
                                : 0;
                    });

                    const completedDuaIds = Array.from(
                        new Set(
                            (
                                (progress && progress.completedDuaIds) ||
                                []
                            ).filter((id) => {
                                if (!allowedIds.has(id)) return false;
                                const target =
                                    targetById.get(id) ||
                                    Number.MAX_SAFE_INTEGER;
                                return (duaCounts[id] || 0) >= target;
                            }),
                        ),
                    );

                    return {
                        selectedDuaId,
                        duaCounts,
                        completedDuaIds,
                        hasCompletedAny: completedDuaIds.length > 0,
                    };
                };

                const migratePersistedState = (state) => {
                    const safeSelectedPrayer = PRAYER_ORDER.includes(
                        state.selectedPrayer,
                    )
                        ? state.selectedPrayer
                        : "fajr";

                    const target = Number(
                        state.customMode && state.customMode.target,
                    );
                    const count = Number(
                        state.customMode && state.customMode.count,
                    );
                    const safeTarget = Number.isFinite(target)
                        ? Math.max(1, Math.min(1000, Math.floor(target)))
                        : 100;
                    const safeCount = Number.isFinite(count)
                        ? Math.max(0, Math.min(safeTarget, Math.floor(count)))
                        : 0;

                    return {
                        ...state,
                        selectedPrayer: safeSelectedPrayer,
                        prayers: {
                            fajr: migratePrayerProgress(
                                "fajr",
                                state.prayers.fajr,
                            ),
                            dhuhr: migratePrayerProgress(
                                "dhuhr",
                                state.prayers.dhuhr,
                            ),
                            asr: migratePrayerProgress(
                                "asr",
                                state.prayers.asr,
                            ),
                            maghrib: migratePrayerProgress(
                                "maghrib",
                                state.prayers.maghrib,
                            ),
                            isha: migratePrayerProgress(
                                "isha",
                                state.prayers.isha,
                            ),
                        },
                        customMode: {
                            count: safeCount,
                            target: safeTarget,
                        },
                    };
                };

                const isIshaTimeOrLater = (date) =>
                    minutesNow(date) >= ISHA_START_MINUTES;

                const didMeetDailyStreakRequirement = (state) => {
                    if (!state.prayers.isha.hasCompletedAny) return false;
                    return PRAYER_ORDER.every(
                        (p) =>
                            state.prayers[p].completedDuaIds.length >=
                            MIN_COMPLETED_DUAS_PER_PRAYER_FOR_STREAK,
                    );
                };

                const applyIshaStreakIfEligible = (state, now) => {
                    if (!isIshaTimeOrLater(now)) return state;
                    if (state.lastStreakDate === state.dateKey) return state;
                    if (!didMeetDailyStreakRequirement(state)) return state;

                    const streak =
                        state.lastStreakDate &&
                        isConsecutiveDay(state.lastStreakDate, state.dateKey)
                            ? state.streak + 1
                            : 1;

                    return {
                        ...state,
                        streak,
                        lastStreakDate: state.dateKey,
                    };
                };

                const rollForwardState = (state, now) => {
                    const todayKey = toDateKey(now);
                    if (state.dateKey === todayKey) {
                        return applyIshaStreakIfEligible(state, now);
                    }

                    const passedDays = dayDiff(state.dateKey, todayKey);

                    let streak = state.streak;
                    let lastStreakDate = state.lastStreakDate;

                    // Midnight resets daily progress only; streak must already be
                    // awarded during Isha for the previous date.
                    if (state.lastStreakDate !== state.dateKey) {
                        streak = 0;
                        lastStreakDate = null;
                    }

                    if (passedDays > 1) {
                        streak = 0;
                        lastStreakDate = null;
                    }

                    const fresh = createEmptyDailyState(
                        now,
                        getPrayerForTime(now) || state.selectedPrayer,
                    );
                    fresh.customMode = state.customMode || {
                        count: 0,
                        target: 100,
                    };
                    fresh.streak = streak;
                    fresh.lastStreakDate = lastStreakDate;
                    return fresh;
                };

                const loadSettings = () => {
                    try {
                        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
                        if (raw) {
                            const parsed = JSON.parse(raw);
                            const parsedIntensity = Number(
                                parsed.vibrationIntensity,
                            );
                            const safeIntensity = Number.isFinite(
                                parsedIntensity,
                            )
                                ? Math.max(
                                      0,
                                      Math.min(
                                          100,
                                          Math.floor(parsedIntensity / 5) * 5,
                                      ),
                                  )
                                : 40;
                            return {
                                vibration:
                                    (parsed.vibration ?? true) &&
                                    safeIntensity > 0,
                                vibrationIntensity: safeIntensity,
                                counterVariant:
                                    parsed.counterVariant ?? "classic",
                                appMode: parsed.appMode ?? "prayer",
                            };
                        }
                    } catch (_err) {
                        // Ignore malformed data and continue with defaults.
                    }

                    return {
                        vibration: true,
                        vibrationIntensity: 40,
                        counterVariant: "classic",
                        appMode: "prayer",
                    };
                };

                const loadAppState = () => {
                    const now = new Date();
                    const fallback = createEmptyDailyState(now);

                    try {
                        const raw = localStorage.getItem(APP_STORAGE_KEY);
                        if (!raw) return fallback;

                        const parsed = JSON.parse(raw);
                        if (
                            !parsed ||
                            !parsed.dateKey ||
                            !parsed.prayers ||
                            !parsed.selectedPrayer
                        ) {
                            return fallback;
                        }

                        const safe = {
                            dateKey: parsed.dateKey,
                            selectedPrayer: parsed.selectedPrayer,
                            prayers: {
                                fajr:
                                    parsed.prayers.fajr ||
                                    createEmptyPrayerProgress("fajr"),
                                dhuhr:
                                    parsed.prayers.dhuhr ||
                                    createEmptyPrayerProgress("dhuhr"),
                                asr:
                                    parsed.prayers.asr ||
                                    createEmptyPrayerProgress("asr"),
                                maghrib:
                                    parsed.prayers.maghrib ||
                                    createEmptyPrayerProgress("maghrib"),
                                isha:
                                    parsed.prayers.isha ||
                                    createEmptyPrayerProgress("isha"),
                            },
                            customMode: parsed.customMode || {
                                count: 0,
                                target: 100,
                            },
                            streak: parsed.streak ?? 0,
                            lastStreakDate: parsed.lastStreakDate ?? null,
                        };

                        return rollForwardState(
                            migratePersistedState(safe),
                            now,
                        );
                    } catch (_err) {
                        return fallback;
                    }
                };

                const state = {
                    now: new Date(),
                    appState: loadAppState(),
                    settings: loadSettings(),
                    isFullscreen: !!document.fullscreenElement,
                };

                const getPrayerData = () =>
                    state.appState.prayers[state.appState.selectedPrayer];

                const getSelectedDua = () => {
                    const prayer = state.appState.selectedPrayer;
                    const prayerData = getPrayerData();
                    if (prayerData.selectedDuaId) {
                        const found = duas.find(
                            (d) =>
                                d.id === prayerData.selectedDuaId &&
                                d.prayer.includes(prayer),
                        );
                        if (found) return found;
                    }
                    return firstDuaForPrayer(prayer);
                };

                const getPrayerCount = () => {
                    const selectedDua = getSelectedDua();
                    if (!selectedDua) return 0;
                    return getPrayerData().duaCounts[selectedDua.id] || 0;
                };

                const getTarget = () => {
                    if (state.settings.appMode === "custom")
                        return state.appState.customMode.target;
                    const selectedDua = getSelectedDua();
                    return selectedDua ? selectedDua.target : 0;
                };

                const getDisplayCount = () =>
                    state.settings.appMode === "custom"
                        ? state.appState.customMode.count
                        : getPrayerCount();

                const getCompletionByDuaId = () => {
                    const prayer = state.appState.selectedPrayer;
                    const prayerProgress = state.appState.prayers[prayer];
                    const result = {};
                    duas.filter((d) => d.prayer.includes(prayer)).forEach(
                        (d) => {
                            const c = prayerProgress.duaCounts[d.id] || 0;
                            result[d.id] = c >= d.target;
                        },
                    );
                    return result;
                };

                const persistSettings = () =>
                    localStorage.setItem(
                        SETTINGS_STORAGE_KEY,
                        JSON.stringify(state.settings),
                    );
                const persistAppState = () =>
                    localStorage.setItem(
                        APP_STORAGE_KEY,
                        JSON.stringify(state.appState),
                    );

                const closeMenus = () => {
                    duaMenu.classList.add("hidden");
                    settingsPanel.classList.add("hidden");
                    duaChevron.classList.remove("open");
                    duaButton.setAttribute("aria-expanded", "false");
                    settingsToggle.setAttribute("aria-expanded", "false");
                };

                const setPrayerBg = () => {
                    app.classList.remove(
                        "prayer-bg-fajr",
                        "prayer-bg-dhuhr",
                        "prayer-bg-asr",
                        "prayer-bg-maghrib",
                        "prayer-bg-isha",
                    );
                    app.classList.add(
                        prayerBgClass[state.appState.selectedPrayer],
                    );
                };

                const drawClassicRing = (count, target) => {
                    classicRing.innerHTML = "";
                    if (target <= 0) return;

                    const radius = 130;
                    const center = 160;
                    const dotRadius = target <= 34 ? 5 : target <= 50 ? 4 : 3;

                    for (let i = 0; i < target; i += 1) {
                        const angle = (i / target) * Math.PI * 2 - Math.PI / 2;
                        const x = center + radius * Math.cos(angle);
                        const y = center + radius * Math.sin(angle);
                        const isActive = i < count;
                        const hue = (i / target) * 360;

                        const circle = document.createElementNS(
                            svgNS,
                            "circle",
                        );
                        circle.setAttribute("cx", String(x));
                        circle.setAttribute("cy", String(y));
                        circle.setAttribute("r", String(dotRadius));
                        circle.setAttribute(
                            "fill",
                            isActive
                                ? `hsl(${hue}, 80%, 60%)`
                                : "hsl(220, 12%, 18%)",
                        );
                        classicRing.appendChild(circle);
                    }
                };

                const drawModernRing = (count, target) => {
                    modernRing.innerHTML = "";

                    const center = 160;
                    const radius = 118;
                    const circumference = 2 * Math.PI * radius;
                    const progress =
                        target > 0 ? Math.min(count / target, 1) : 0;

                    const track = document.createElementNS(svgNS, "circle");
                    track.setAttribute("cx", String(center));
                    track.setAttribute("cy", String(center));
                    track.setAttribute("r", String(radius));
                    track.setAttribute("fill", "none");
                    track.setAttribute("stroke", "hsl(220, 12%, 18%)");
                    track.setAttribute("stroke-width", "16");
                    modernRing.appendChild(track);

                    const progressCircle = document.createElementNS(
                        svgNS,
                        "circle",
                    );
                    progressCircle.setAttribute("cx", String(center));
                    progressCircle.setAttribute("cy", String(center));
                    progressCircle.setAttribute("r", String(radius));
                    progressCircle.setAttribute("fill", "none");
                    progressCircle.setAttribute("stroke", "hsl(42, 62%, 52%)");
                    progressCircle.setAttribute("stroke-width", "16");
                    progressCircle.setAttribute("stroke-linecap", "round");
                    progressCircle.setAttribute(
                        "transform",
                        `rotate(-90 ${center} ${center})`,
                    );
                    progressCircle.setAttribute(
                        "stroke-dasharray",
                        String(circumference),
                    );
                    progressCircle.setAttribute(
                        "stroke-dashoffset",
                        String(circumference * (1 - progress)),
                    );
                    progressCircle.style.filter =
                        "drop-shadow(0 0 6px hsl(42 62% 52% / 0.38))";
                    modernRing.appendChild(progressCircle);
                };

                const renderCounter = () => {
                    const count = getDisplayCount();
                    const target = getTarget();
                    const prayer = state.appState.selectedPrayer;

                    countValue.textContent = String(count);

                    if (state.settings.counterVariant === "modern") {
                        classicRing.classList.add("hidden");
                        modernRing.classList.remove("hidden");
                        drawModernRing(count, target);
                    } else {
                        modernRing.classList.add("hidden");
                        classicRing.classList.remove("hidden");
                        drawClassicRing(count, target);
                    }

                    const done = target > 0 && count === target;
                    if (done) {
                        completionGlow.classList.remove("hidden");
                        completionGlow.style.background = `radial-gradient(circle, hsl(${glowHues[prayer]} / 0.22) 0%, transparent 70%)`;
                        centerCircle.classList.add("done");
                        setTimeout(
                            () => centerCircle.classList.remove("done"),
                            520,
                        );
                    } else {
                        completionGlow.classList.add("hidden");
                    }
                };

                const renderPrayerSelector = () => {
                    prayerSelector.innerHTML = "";
                    const activePrayer = getPrayerForTime(state.now);
                    const lockedPrayers = getLockedPrayersByTime(state.now);
                    const isPrayerMode = state.settings.appMode === "prayer";

                    prayers.forEach((p) => {
                        const btn = document.createElement("button");
                        btn.type = "button";

                        const isActive = state.appState.selectedPrayer === p.id;
                        const isCurrentTimePrayer = activePrayer === p.id;
                        const isDisabled =
                            isPrayerMode &&
                            activePrayer !== null &&
                            !isCurrentTimePrayer;

                        btn.className = `prayer-btn${isActive ? " active" : ""}${isDisabled ? " disabled" : ""}${lockedPrayers[p.id] ? " locked" : ""}`;
                        btn.disabled = isDisabled;
                        btn.innerHTML = `<span class="prayer-icon">${p.icon}</span><span class="prayer-label">${p.label}</span>`;
                        btn.addEventListener("click", (event) => {
                            event.stopPropagation();
                            if (isDisabled) return;
                            if (state.appState.selectedPrayer === p.id) return;
                            state.appState.selectedPrayer = p.id;
                            renderAll();
                            persistAppState();
                        });
                        prayerSelector.appendChild(btn);
                    });
                };

                const renderDuaMenu = () => {
                    const selectedDua = getSelectedDua();
                    const filtered = duas.filter((d) =>
                        d.prayer.includes(state.appState.selectedPrayer),
                    );
                    const completionByDuaId = getCompletionByDuaId();

                    duaMenu.innerHTML = "";

                    filtered.forEach((dua) => {
                        const isDone = !!completionByDuaId[dua.id];
                        const item = document.createElement("button");
                        item.type = "button";
                        item.className = `dua-item${selectedDua && selectedDua.id === dua.id ? " active" : ""}`;
                        item.innerHTML = `
                <div class="dua-item-top">
                    <div class="arabic">${dua.arabic}</div>
                    <span class="dua-status ${isDone ? "done" : "todo"}">${isDone ? "✓" : "✗"}</span>
                </div>
                <div class="detail">${dua.transliteration} - ${dua.meaning}</div>
                <div class="target">Target: ${dua.target}x</div>
            `;
                        item.addEventListener("click", (event) => {
                            event.stopPropagation();
                            state.appState.prayers[
                                state.appState.selectedPrayer
                            ].selectedDuaId = dua.id;
                            closeMenus();
                            renderAll();
                            persistAppState();
                        });
                        duaMenu.appendChild(item);
                    });

                    if (selectedDua) {
                        duaArabic.textContent = selectedDua.arabic;
                        duaMeta.textContent = `${selectedDua.transliteration} · ${getTarget()}x`;
                        duaMeaning.textContent = `"${selectedDua.meaning}"`;
                        const done = !!completionByDuaId[selectedDua.id];
                        selectedDuaStatus.textContent = done ? "✓" : "✗";
                        selectedDuaStatus.className = `selected-status ${done ? "done" : "todo"}`;
                    } else {
                        duaArabic.textContent = "Select a Dua...";
                        duaMeta.textContent = "";
                        duaMeaning.textContent = "";
                        selectedDuaStatus.textContent = "✗";
                        selectedDuaStatus.className = "selected-status todo";
                    }
                };

                const renderSettings = () => {
                    vibrationCheck.checked = !!state.settings.vibration;
                    intensityRange.value = String(
                        state.settings.vibrationIntensity,
                    );
                    intensityValue.textContent = String(
                        state.settings.vibrationIntensity,
                    );
                    intensityWrap.classList.toggle(
                        "hidden",
                        !state.settings.vibration,
                    );

                    modeToggle.textContent =
                        state.settings.appMode === "prayer"
                            ? "Custom Mode"
                            : "Prayer Mode";
                    styleToggle.textContent =
                        state.settings.counterVariant === "modern"
                            ? "Classic"
                            : "Modern";
                    fullscreenToggle.textContent = state.isFullscreen
                        ? "Exit Full Screen"
                        : "Full Screen";

                    customTargetWrap.classList.toggle(
                        "hidden",
                        state.settings.appMode !== "custom",
                    );
                    customTargetRange.value = String(
                        state.appState.customMode.target,
                    );
                    customTargetValue.textContent = String(
                        state.appState.customMode.target,
                    );
                };

                const renderTopState = () => {
                    streakValue.textContent = String(state.appState.streak);
                    setPrayerBg();
                };

                const renderAll = () => {
                    renderTopState();
                    renderPrayerSelector();
                    renderDuaMenu();
                    renderSettings();
                    renderCounter();
                };

                const incrementCount = () => {
                    const target = getTarget();
                    const count = getDisplayCount();
                    if (target === 0 || count >= target) return;

                    if (state.settings.appMode === "custom") {
                        state.appState.customMode.count = Math.min(
                            state.appState.customMode.count + 1,
                            state.appState.customMode.target,
                        );
                    } else {
                        const activePrayer = getPrayerForTime(state.now);
                        const selectedPrayer = state.appState.selectedPrayer;
                        const lockedPrayers = getLockedPrayersByTime(state.now);
                        const selectedDua = getSelectedDua();

                        if (!selectedDua) return;
                        if (activePrayer === null) return;
                        if (selectedPrayer !== activePrayer) return;
                        if (lockedPrayers[selectedPrayer]) return;

                        const prayerProgress =
                            state.appState.prayers[selectedPrayer];
                        const currentCount =
                            prayerProgress.duaCounts[selectedDua.id] || 0;
                        const nextCount = Math.min(currentCount + 1, target);
                        const completed =
                            prayerProgress.completedDuaIds.slice();

                        prayerProgress.duaCounts[selectedDua.id] = nextCount;
                        if (
                            nextCount >= target &&
                            !completed.includes(selectedDua.id)
                        ) {
                            completed.push(selectedDua.id);
                            prayerProgress.completedDuaIds = completed;
                        }
                        prayerProgress.hasCompletedAny =
                            prayerProgress.completedDuaIds.length > 0;

                        state.appState = applyIshaStreakIfEligible(
                            state.appState,
                            new Date(),
                        );
                    }

                    if (
                        state.settings.vibration &&
                        state.settings.vibrationIntensity > 0 &&
                        navigator.vibrate
                    ) {
                        navigator.vibrate(state.settings.vibrationIntensity);
                        if (count + 1 === target) {
                            setTimeout(() => {
                                if (
                                    state.settings.vibration &&
                                    state.settings.vibrationIntensity > 0 &&
                                    navigator.vibrate
                                ) {
                                    navigator.vibrate([100, 80, 100, 80, 300]);
                                }
                            }, 120);
                        }
                    }

                    renderCounter();
                    renderDuaMenu();
                    persistAppState();
                };

                const resetAllData = () => {
                    localStorage.removeItem(APP_STORAGE_KEY);
                    localStorage.removeItem(SETTINGS_STORAGE_KEY);

                    state.settings = {
                        vibration: true,
                        vibrationIntensity: 40,
                        counterVariant: "classic",
                        appMode: "prayer",
                    };
                    state.appState = createEmptyDailyState(new Date());
                    state.now = new Date();
                    closeMenus();
                    renderAll();
                };

                const toggleFullscreen = async () => {
                    try {
                        if (document.fullscreenElement) {
                            await document.exitFullscreen();
                        } else {
                            await document.documentElement.requestFullscreen();
                        }
                    } catch (_err) {
                        // Ignore unsupported or blocked fullscreen requests.
                    }
                };

                const updateClockAndRollState = () => {
                    state.now = new Date();
                    state.appState = rollForwardState(
                        state.appState,
                        state.now,
                    );

                    const activePrayer = getPrayerForTime(state.now);
                    if (
                        state.settings.appMode === "prayer" &&
                        activePrayer &&
                        state.appState.selectedPrayer !== activePrayer
                    ) {
                        state.appState.selectedPrayer = activePrayer;
                    }

                    renderAll();
                    persistAppState();
                };

                app.addEventListener("click", incrementCount);

                [
                    duaButton,
                    duaMenu,
                    settingsShell,
                    centerCircle,
                    prayerSelector,
                ].forEach((el) => {
                    el.addEventListener("click", (event) =>
                        event.stopPropagation(),
                    );
                });

                duaButton.addEventListener("click", () => {
                    const isOpen = !duaMenu.classList.contains("hidden");
                    closeMenus();
                    if (!isOpen) {
                        duaMenu.classList.remove("hidden");
                        duaChevron.classList.add("open");
                        duaButton.setAttribute("aria-expanded", "true");
                    }
                });

                settingsToggle.addEventListener("click", () => {
                    const isOpen = !settingsPanel.classList.contains("hidden");
                    closeMenus();
                    if (!isOpen) {
                        settingsPanel.classList.remove("hidden");
                        settingsToggle.setAttribute("aria-expanded", "true");
                    }
                });

                document.addEventListener("click", closeMenus);

                centerCircle.addEventListener("dblclick", (event) => {
                    event.stopPropagation();
                    if (state.settings.appMode === "custom") {
                        state.appState.customMode.count = 0;
                    } else {
                        const selectedDua = getSelectedDua();
                        if (!selectedDua) return;
                        const prayerProgress = getPrayerData();
                        prayerProgress.duaCounts[selectedDua.id] = 0;
                    }
                    renderCounter();
                    renderDuaMenu();
                    persistAppState();
                });

                vibrationCheck.addEventListener("change", () => {
                    state.settings.vibration = vibrationCheck.checked;
                    if (
                        state.settings.vibration &&
                        state.settings.vibrationIntensity === 0
                    ) {
                        state.settings.vibrationIntensity = 40;
                    }
                    if (!state.settings.vibration) {
                        state.settings.vibrationIntensity = 0;
                    }
                    persistSettings();
                    renderSettings();
                });

                intensityRange.addEventListener("input", () => {
                    state.settings.vibrationIntensity = Number.parseInt(
                        intensityRange.value,
                        10,
                    );
                    state.settings.vibration =
                        state.settings.vibrationIntensity > 0;
                    persistSettings();
                    renderSettings();
                });

                modeToggle.addEventListener("click", () => {
                    state.settings.appMode =
                        state.settings.appMode === "prayer"
                            ? "custom"
                            : "prayer";
                    persistSettings();
                    renderAll();
                });

                customTargetRange.addEventListener("input", () => {
                    const safe = Math.max(
                        1,
                        Math.min(
                            1000,
                            Number.parseInt(customTargetRange.value, 10),
                        ),
                    );
                    state.appState.customMode.target = safe;
                    state.appState.customMode.count = Math.min(
                        state.appState.customMode.count,
                        safe,
                    );
                    renderAll();
                    persistAppState();
                });

                styleToggle.addEventListener("click", () => {
                    state.settings.counterVariant =
                        state.settings.counterVariant === "modern"
                            ? "classic"
                            : "modern";
                    persistSettings();
                    renderAll();
                });

                fullscreenToggle.addEventListener("click", toggleFullscreen);

                document.addEventListener("fullscreenchange", () => {
                    state.isFullscreen = !!document.fullscreenElement;
                    renderSettings();
                });

                resetAllButton.addEventListener("click", () => {
                    const yes = window.confirm(
                        "Delete all tasbih data? This will remove saved progress, counts, daily data, and streak.",
                    );
                    if (yes) resetAllData();
                });

                updateClockAndRollState();

                const heartbeat = setInterval(updateClockAndRollState, 30000);
                window.addEventListener("beforeunload", () =>
                    clearInterval(heartbeat),
                );

                const nextMidnight = new Date();
                nextMidnight.setHours(24, 0, 0, 0);
                const msUntilMidnight = Math.max(
                    nextMidnight.getTime() - Date.now(),
                    0,
                );
                setTimeout(updateClockAndRollState, msUntilMidnight + 20);

                if ("serviceWorker" in navigator) {
                    window.addEventListener("load", () => {
                        navigator.serviceWorker
                            .register("./sw.js")
                            .catch(() => {
                                // Ignore registration errors in unsupported/local file contexts.
                            });
                    });
                }
            })();
        </script>
    </body>
</html>
